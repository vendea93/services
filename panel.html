<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowQuest OS - Kompendium Architekta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5; /* Indigo */
            --primary-light: #e0e7ff;
            --secondary: #0ea5e9; /* Ocean Blue */
            --bg-main: #f9fafb;
            --bg-card: #ffffff;
            --text-dark: #111827;
            --text-body: #4b5563;
            --text-muted: #9ca3af;
            --border-color: #e5e7eb;
            --success: #10b981;
            --danger: #ef4444;
            --premium: #8b5cf6; /* Purple for addons */
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-body); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar - Accordion Layout */
        .sidebar { 
            width: 340px; 
            background: var(--bg-card); 
            border-right: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 10;
        }
        
        .sidebar-header { 
            padding: 30px 25px; 
            border-bottom: 1px solid var(--border-color); 
            background: linear-gradient(to right, #ffffff, #f9fafb);
            flex-shrink: 0;
        }
        
        .sidebar-header h1 { margin: 0; font-size: 1.4em; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; }
        .sidebar-header h1 span { color: var(--primary); }
        .sidebar-header p { margin: 8px 0 0; font-size: 0.85em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        
        /* Accordion Styles */
        .nav-group { border-bottom: 1px solid var(--border-color); }
        .nav-group-header {
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--text-dark);
            background: #fdfdfd;
            transition: background 0.2s;
        }
        .nav-group-header:hover { background: var(--bg-main); }
        .nav-group-header i.arrow { transition: transform 0.3s; color: var(--text-muted); }
        .nav-group.active .nav-group-header i.arrow { transform: rotate(180deg); }
        
        .nav-group-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: var(--bg-card);
        }
        .nav-group.active .nav-group-content { max-height: 1000px; /* arbitrary large value */ }

        .tab-list { list-style: none; padding: 10px 15px; margin: 0; display: flex; flex-direction: column; gap: 4px; }
        
        .tab-btn { 
            width: 100%; 
            text-align: left; 
            background: transparent; 
            border: 1px solid transparent; 
            color: var(--text-body); 
            padding: 12px 15px; 
            cursor: pointer; 
            border-radius: 8px;
            transition: all 0.2s ease; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 0.9em; 
            font-weight: 600;
        }
        
        .tab-btn i.icon-main { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: #f3f4f6; color: var(--text-body); transition: 0.2s; }
        .tab-btn:hover { background: var(--bg-main); border-color: var(--border-color); transform: translateX(4px); }
        
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
        .tab-btn.active i.icon-main { background: rgba(255,255,255,0.2); color: white; }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 50px; scroll-behavior: smooth; }
        .content-wrapper { max-width: 1050px; margin: auto; }

        /* General UI Elements */
        .header-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 20px; }
        .badge-industry { background: var(--primary-light); color: var(--primary); }
        .badge-addon { background: #f3e8ff; color: var(--premium); }
        .badge-service { background: #dcfce7; color: var(--success); }

        .page-title { font-size: 2.8em; font-weight: 800; color: var(--text-dark); margin: 0 0 15px 0; letter-spacing: -1px; }
        .page-desc { font-size: 1.2em; color: var(--text-body); line-height: 1.6; margin: 0 0 40px 0; max-width: 800px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 30px; }
        
        .card { background: var(--bg-card); border-radius: 16px; padding: 35px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .section-title { font-size: 1.3em; font-weight: 800; color: var(--text-dark); display: flex; align-items: center; gap: 12px; margin-top: 0; margin-bottom: 25px; }
        
        /* Core Grid */
        .core-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .core-item { display: flex; gap: 15px; align-items: flex-start; }
        .core-item-icon { flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
        .core-item h4 { margin: 0 0 5px 0; color: var(--text-dark); font-size: 1em; }
        .core-item p { margin: 0; font-size: 0.9em; line-height: 1.5; color: var(--text-muted); }

        /* Lists */
        ul.custom-list { padding: 0; margin: 0; list-style: none; }
        ul.custom-list li { position: relative; padding-left: 32px; margin-bottom: 16px; line-height: 1.6; }
        ul.custom-list li::before { 
            content: '\f00c'; font-family: 'FontAwesome'; position: absolute; left: 0; top: 2px;
            color: var(--success); background: #dcfce7; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.6em;
        }
        ul.problem-list li::before { content: '\f00d'; color: var(--danger); background: #fee2e2; }

        /* Addon/Service Boxes */
        .addon-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--secondary); transition: transform 0.2s; }
        .addon-box:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .addon-box h4 { margin: 0 0 8px 0; color: var(--text-dark); display: flex; align-items: center; gap: 8px; justify-content: space-between; }
        .addon-box h4 span.tag { background: var(--secondary); color: white; font-size: 0.7em; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; }
        
        /* Copywriting Section */
        .copy-box { background: linear-gradient(135deg, var(--text-dark) 0%, #1f2937 100%); color: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .copy-box h4 { color: var(--secondary); margin-top: 0; text-transform: uppercase; font-size: 0.85em; letter-spacing: 1px; margin-bottom: 20px; opacity: 0.9; }
        .copy-box p { font-size: 1.15em; line-height: 1.8; font-weight: 300; }

        /* Tags */
        .seo-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .seo-tag { background: #f3f4f6; border: 1px solid #e5e7eb; padding: 6px 14px; border-radius: 20px; font-size: 0.85em; color: var(--text-body); font-weight: 600; }

        /* Pricing Badge for Services */
        .price-badge { background: #f1f5f9; padding: 5px 10px; border-radius: 6px; font-size: 0.9em; color: var(--text-dark); font-weight: bold; display: inline-block; margin-top: 10px; border: 1px solid var(--border-color); }

        .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
